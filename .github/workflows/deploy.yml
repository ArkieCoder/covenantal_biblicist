name: Deploy to GitHub Pages
on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    env:
      ADOBE_CLIENT_ID: ${{ secrets.ADOBE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - name: Install Python dependencies
        run: |
          apt-get update && apt-get install -y python3-pip
          pip3 install --break-system-packages -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build all articles
        run: ./build.sh
      - name: Run Pagefind
        run: npx pagefind --site _site/
      - name: Commit built artifacts
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/*/*.pdf articles/*/*.html index.html tags/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update built artifacts [skip ci]"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
