<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covenantal Biblicist</title>
  <style>
    body { margin: 0; font-family: Georgia, serif; background: #fff; }
    :root { --gunmetal: #2c3539; }
    #header {
      background: linear-gradient(to bottom, var(--gunmetal) calc(100% - 15px), transparent 100%);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 4.5rem;
      padding-bottom: 0.8rem;
    }
    #header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: normal;
      font-variant: small-caps;
      font-family: "Copperplate", "Copperplate Gothic Light", "Georgia", serif;
      letter-spacing: 0.1em;
      color: #f5f5f5;
    }
    #adobe-dc-view { width: 90%; max-width: 1200px; margin: 0 auto; padding-top: 100px; padding-bottom: 120px; height: calc(100vh - 100px); }
    #download-btn {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      padding: 0.6rem 2rem;
      background: #1a1a2e;
      color: #f5f5f5;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      text-decoration: none;
      border: 2px solid #f5f5f5;
      border-radius: 4px;
    }
    #download-btn:hover { background: #2a2a3e; }
    #footer-title {
      position: fixed;
      bottom: 32px;
      left: 0;
      width: 50%;
      text-align: center;
      z-index: 101;
      font-size: 1.4rem;
      font-weight: normal;
      font-variant: small-caps;
      font-family: "Copperplate", "Copperplate Gothic Light", "Georgia", serif;
      letter-spacing: 0.1em;
      color: #f5f5f5;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }
    #footer-title.visible {
      transform: translateY(0);
      opacity: 1;
    }
    #page-cover {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent 0%, var(--gunmetal) 15px);
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Covenantal Biblicist</h1>
  </div>
  <div id="adobe-dc-view"></div>
  <a id="download-btn" href="voting_in_elder_led_churches.pdf" onclick="window.open(this.href); return false;">Download PDF</a>
  <div id="footer-title">Covenantal Biblicist</div>
  <div id="page-cover"></div>

  <script src="https://acrobatservices.adobe.com/view-sdk/viewer.js"></script>
  <script type="text/javascript">
    document.addEventListener("adobe_dc_view_sdk.ready", function () {
      var adobeDCView = new AdobeDC.View({clientId: "bd4cb7ccbcdc4940adb98b75683d410a", divId: "adobe-dc-view"});
      adobeDCView.previewFile(
        {
          content: {location: {url: "voting_in_elder_led_churches-embed.pdf"}},
          metaData: {fileName: "voting_in_elder_led_churches.pdf"}
        },
        {embedMode: "IN_LINE"}
      );
    });
    var footerTitle = document.getElementById("footer-title");
    var header = document.getElementById("header");
    window.addEventListener("scroll", function () {
      var headerBottom = header.getBoundingClientRect().bottom;
      if (headerBottom < 0) {
        footerTitle.classList.add("visible");
      } else {
        footerTitle.classList.remove("visible");
      }
    });
  </script>
</body>
</html>
