<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covenantal Biblicist</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script data-goatcounter="https://covenantbiblicist.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <div id="header">
    <h1><a href="../../">Covenantal Biblicist</a></h1>
  </div>
  <div id="adobe-dc-view"></div>
  <div id="footer-bar">
    <div id="footer-title"><a href="../../">Covenantal Biblicist</a></div>
    <div class="build-id" data-build-id="1784555775" data-build-iso="2026-07-20T13:56:15+00:00" data-gc-path="/articles/reach_men_reach_families/"><span class="build-id-text">Build ID: 1784555775</span> &middot; <span class="views">Views: --</span></div>
    <div id="footer-icons">
      <a href="reach_men_reach_families.pdf" onclick="window.open(this.href); return false;" title="Open PDF"><i class="fa-solid fa-print"></i></a>
      <div class="share-email-wrap">
        <a id="share-email" href="#" title="Email"><i class="fa-solid fa-envelope"></i></a>
        <div class="share-email-menu">
          <a id="share-email-native" href="#"><i class="fa-solid fa-envelope"></i> Mail client</a>
          <a id="share-gmail" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-google"></i> Gmail</a>
        </div>
      </div>
      <a id="share-facebook" href="#" target="_blank" rel="noopener" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a id="share-x" href="#" target="_blank" rel="noopener" title="X"><i class="fa-brands fa-x-twitter"></i></a>
    </div>
  </div>
  <div id="page-cover"></div>

  <script src="https://acrobatservices.adobe.com/view-sdk/viewer.js"></script>
  <script type="text/javascript">
    document.addEventListener("adobe_dc_view_sdk.ready", function () {
      function getPdfVariant() {
        if (window.matchMedia("(max-width: 599px)").matches) return "embedmobile";
        if (window.matchMedia("(max-width: 1023px)").matches) return "embedtablet";
        return "embed";
      }

      var variant = getPdfVariant();
      var pdfUrl = "reach_men_reach_families-" + variant + ".pdf";

      var adobeDCView = new AdobeDC.View({
        clientId: "ff71be20bad948cbb5dabeb2e1acb0c7",
        divId: "adobe-dc-view"
      });
      adobeDCView.previewFile(
        {
          content: { location: { url: pdfUrl } },
          metaData: { fileName: "reach_men_reach_families.pdf" }
        },
        { embedMode: "IN_LINE" }
      );
    });

    var shareTitle = "Reach Men, Reach Families";
    var shareUrl = window.location.href;

    document.getElementById("share-email-native").href =
      "mailto:?subject=" + encodeURIComponent(shareTitle) + "&body=" + encodeURIComponent(shareUrl);

    document.getElementById("share-gmail").href =
      "https://mail.google.com/mail/?view=cm&fs=1&su=" + encodeURIComponent(shareTitle) + "&body=" + encodeURIComponent(shareUrl);

    document.getElementById("share-email").addEventListener("click", function(e) {
      e.preventDefault();
      this.parentNode.querySelector(".share-email-menu").classList.toggle("open");
    });

    document.addEventListener("click", function(e) {
      if (!e.target.closest(".share-email-wrap")) {
        var menu = document.querySelector(".share-email-menu");
        if (menu) menu.classList.remove("open");
      }
    });

    document.getElementById("share-facebook").href =
      "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(shareUrl);

    document.getElementById("share-x").href =
      "https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareTitle) + "&url=" + encodeURIComponent(shareUrl);

    var footerTitle = document.getElementById("footer-title");
    var header = document.getElementById("header");
    window.addEventListener("scroll", function () {
      var headerBottom = header.getBoundingClientRect().bottom;
      if (headerBottom < 0) {
        footerTitle.classList.add("visible");
      } else {
        footerTitle.classList.remove("visible");
      }
    });
  </script>
  <script src="../../js/visitor-count.js"></script>
  <script>
    (function() {
      var currentVariant = getPdfVariant();
      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          var newVariant = getPdfVariant();
          if (newVariant !== currentVariant) {
            location.reload();
          }
        }, 300);
      });
    })();
  </script>
</body>
</html>
